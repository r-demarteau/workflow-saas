services:
  wp:
    image: wordpress:latest
    restart: unless-stopped
    env_file: .env.wp.secrets
    ports:
      - "127.0.0.1:{{WP_PORT}}:80"
    environment:
      WORDPRESS_DB_HOST: "{{SLUG}}-db-1"
      WORDPRESS_DB_NAME: "{{WP_DB_NAME}}"
      WORDPRESS_DB_USER: "{{WP_DB_USER}}"
      WORDPRESS_CONFIG_EXTRA: "define('WP_HOME','{{WP_URL}}');define('WP_SITEURL','{{WP_URL}}');"
    volumes:
      - wp_data:/var/www/html
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    networks:
      - internal

networks:
  internal:
    external: true
    name: {{SLUG}}_internal

volumes:
  wp_data:
