services:
  app:
    image: {{APP_IMAGE}}
    pull_policy: never
    restart: unless-stopped
    env_file: .env.secrets
    ports:
      - "127.0.0.1:{{PORT}}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: "{{DB_NAME}}"
      DB_USER: "{{DB_USER}}"
      COOKIE_SECURE: "1"
      ADMIN_EMAIL: "{{ADMIN_EMAIL}}"
      WP_AUTH_URL: ""
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: mariadb:11.4
    restart: unless-stopped
    env_file: .env.secrets
    environment:
      MYSQL_DATABASE: "{{DB_NAME}}"
      MYSQL_USER: "{{DB_USER}}"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  db_data:

networks:
  internal:
    driver: bridge
