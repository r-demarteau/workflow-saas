server {
    listen 80;
    listen [::]:80;
    server_name {{SLUG}}.{{DOMAIN}};

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name {{SLUG}}.{{DOMAIN}};

    # Wildcard certificate (covers all subdomains)
    ssl_certificate     /etc/letsencrypt/live/{{CERT_NAME}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{CERT_NAME}}/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Show branded "setting up" page while the app container is starting.
    proxy_intercept_errors on;
    error_page 502 =200 /teamdock-setup-pending;
    location = /teamdock-setup-pending {
        internal;
        alias /opt/teamdock/setup-pending.html;
        add_header Content-Type  "text/html; charset=utf-8";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

{{WP_LOCATION}}
    # Proxy to tenant app
    location / {
        proxy_pass         http://127.0.0.1:{{PORT}};
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }
}
